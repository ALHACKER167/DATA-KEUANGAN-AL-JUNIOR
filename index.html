<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AL JUNIOR — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/login.css">
</head>
<body class="login-body">

<!-- Particles Background -->
<div id="particles"></div>

<!-- Loading Overlay -->
<div id="pageLoader">
  <div class="loader-ring"><span></span><span></span><span></span><span></span></div>
  <p class="loader-label">Memuat...</p>
</div>

<!-- Login Card -->
<div class="login-wrap">
  <div class="login-glow-top"></div>
  <div class="login-glow-bottom"></div>

  <div class="login-card">
    <div class="login-header">
      <div class="login-icon-wrap">
        <i class="fas fa-coins"></i>
        <div class="icon-ring"></div>
      </div>
      <h1>DATA KEUANGAN</h1>
      <span class="login-brand">AL JUNIOR</span>
      <p>Sistem Manajemen Keuangan Premium</p>
    </div>

    <div id="loginError" class="alert-error" style="display:none">
      <i class="fas fa-exclamation-circle"></i>
      <span id="loginErrorMsg">Username atau password salah.</span>
    </div>

    <div id="ipError" class="alert-error" style="display:none">
      <i class="fas fa-ban"></i>
      <span>Akses ditolak. IP Anda tidak diizinkan.</span>
    </div>

    <form id="loginForm" autocomplete="off">
      <div class="form-group">
        <label>Username</label>
        <div class="input-wrap">
          <i class="fas fa-user input-icon"></i>
          <input type="text" id="loginUser" class="form-input" placeholder="Masukkan username" autocomplete="off">
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" id="loginPass" class="form-input" placeholder="Masukkan password" autocomplete="off">
          <button type="button" class="eye-btn" onclick="togglePass()"><i class="fas fa-eye" id="eyeIcon"></i></button>
        </div>
      </div>
      <button type="submit" class="btn-login" id="loginBtn">
        <span class="btn-text"><i class="fas fa-sign-in-alt"></i> Masuk</span>
        <div class="btn-loader" style="display:none"><div class="spin-sm"></div></div>
      </button>
    </form>

    <div class="login-footer">
      <i class="fas fa-shield-alt"></i> Sistem Dilindungi & Terenkripsi
    </div>
  </div>
</div>

<script src="js/auth.js"></script>
<script src="js/login.js"></script>
</body>
</html>
